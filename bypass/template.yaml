AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: OpenHub Bypass Lambda Function URL

Parameters:
  CognitoRegion:
    Type: String
    Default: ap-northeast-1
  CognitoUserPoolId:
    Type: String
  CognitoClientId:
    Type: String

Resources:
  BypassFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: lambda_handler.handler
      Runtime: python3.12
      MemorySize: 256
      Timeout: 60
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - "*"
          AllowMethods:
            - GET
            - POST
            - OPTIONS
          AllowHeaders:
            - Authorization
            - Content-Type
      Environment:
        Variables:
          COGNITO_REGION: !Ref CognitoRegion
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
          COGNITO_CLIENT_ID: !Ref CognitoClientId
          CREDENTIAL_STORE_BACKEND: dynamodb
          DYNAMODB_TABLE_NAME: openhub-credentials
      Policies:
        - DynamoDBCrudPolicy:
            TableName: openhub-credentials

Outputs:
  FunctionUrl:
    Description: Lambda Function URL
    Value: !GetAtt BypassFunction.FunctionUrl
