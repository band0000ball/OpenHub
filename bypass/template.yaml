AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: OpenHub Bypass Lambda Function URL

Parameters:
  CognitoRegion:
    Type: String
    Default: ap-northeast-1
  CognitoUserPoolId:
    Type: String
  CognitoClientId:
    Type: String
  CacheBucketName:
    Type: String
    Default: openhub-cache
  EStatApiKey:
    Type: String
    NoEcho: true
    Default: ""

Resources:
  BypassFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: lambda_handler.handler
      Runtime: python3.12
      Architectures:
        - arm64
      MemorySize: 256
      Timeout: 60
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - "*"
          AllowMethods:
            - GET
            - POST
          AllowHeaders:
            - Authorization
            - Content-Type
      Environment:
        Variables:
          COGNITO_REGION: !Ref CognitoRegion
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
          COGNITO_CLIENT_ID: !Ref CognitoClientId
          CREDENTIAL_STORE_BACKEND: dynamodb
          DYNAMODB_TABLE_NAME: openhub-credentials
      Policies:
        - DynamoDBCrudPolicy:
            TableName: openhub-credentials

  CacheBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref CacheBucketName

  CollectorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: collector.handler.handler
      Runtime: python3.12
      Architectures:
        - arm64
      MemorySize: 512
      Timeout: 900
      Environment:
        Variables:
          CACHE_BUCKET_NAME: !Ref CacheBucketName
          ESTAT_API_KEY: !Ref EStatApiKey
          COLLECTOR_SOURCES: estat,datagojp,egov_law,jma
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref CacheBucketName
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: rate(6 hours)
            Enabled: true

Outputs:
  FunctionUrl:
    Description: Lambda Function URL
    Value: !GetAtt BypassFunctionUrl.FunctionUrl
  CacheBucketName:
    Description: S3 Cache Bucket Name
    Value: !Ref CacheBucket
  CacheBucketArn:
    Description: S3 Cache Bucket ARN
    Value: !GetAtt CacheBucket.Arn
